version: "3"

# Deux réseaux distincts pour isoler HDFS et Spark
networks:
  hdfs_network:
    driver: bridge
    name: hdfs_network
  spark_network:
    driver: bridge
    name: spark_network

services:

  # ==========================================
  # CLUSTER 1 : HDFS (STOCKAGE)
  # ==========================================

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    networks:
      - hdfs_network
    ports:
      - "9870:9870"
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 3
    volumes:
      - namenode-data:/hadoop/dfs/name
      - .:/data:rw

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    networks:
      - hdfs_network
    depends_on:
      - namenode
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - datanode1-data:/hadoop/dfs/data
      - .:/data:rw

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    networks:
      - hdfs_network
    depends_on:
      - namenode
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - datanode2-data:/hadoop/dfs/data
      - .:/data:rw

  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode3
    networks:
      - hdfs_network
    depends_on:
      - namenode
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - datanode3-data:/hadoop/dfs/data
      - .:/data:rw

  # ==========================================
  # CLUSTER 2 : SPARK (CALCUL)
  # ==========================================

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    networks:
      - spark_network
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      INIT_DAEMON_STEP: setup_spark
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    depends_on:
      - namenode
    volumes:
      - .:/data:rw

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    networks:
      - spark_network
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - .:/data:rw

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2
    networks:
      - spark_network
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - .:/data:rw

  jupyter:
    image: easewithdata/pyspark-jupyter-lab-old
    container_name: jupyter
    networks:
      - spark_network
    depends_on:
      - spark-master
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_PORT: 8888
      SPARK_UI_PORT: 4040
    volumes:
      - .:/data:rw

volumes:
  namenode-data:
  datanode1-data:
  datanode2-data:
  datanode3-data:
